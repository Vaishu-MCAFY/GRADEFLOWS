<html>
<head>
    <title>Faculty Login | GradeFlow</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#f1f5f9;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}

.container{

    width:100%;

    display:flex;

    justify-content:center;

    align-items:center;

}

.login-card{

    width:380px;

    background:white;

    border-radius:15px;

    overflow:hidden;

    box-shadow:0 10px 25px rgba(0,0,0,0.15);

}

.login-header{

    background:#0d6efd;

    color:white;

    text-align:center;

    padding:30px 20px;

}

.login-header h1{

    font-size:32px;

    margin-bottom:10px;

}

.login-header p{

    font-size:18px;

}

.login-body{

    padding:30px;

}

.login-body label{

    display:block;

    margin-bottom:8px;

    font-weight:bold;

    color:#333;

}

.login-body input{

    width:100%;

    padding:12px;

    margin-bottom:20px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:16px;

    outline:none;

    transition:.3s;

}

.login-body input:focus{

    border-color:#0d6efd;

    box-shadow:0 0 6px rgba(13,110,253,.3);

}

.login-body button{

    width:100%;

    padding:13px;

    background:#0d6efd;

    color:white;

    border:none;

    border-radius:8px;

    font-size:18px;

    cursor:pointer;

    transition:.3s;

}

.login-body button:hover{

    background:#0b5ed7;

}

.login-footer{

    background:#f7f7f7;

    text-align:center;

    padding:20px;

    border-top:1px solid #ddd;

}

.login-footer p{

    font-weight:bold;

    margin-bottom:5px;

}

.login-footer small{

    color:#666;

}

@media(max-width:480px){

.login-card{

    width:90%;

}

.login-header h1{

    font-size:28px;

}

.login-body{

    padding:20px;

}

}
</style>
</head>
<body>

<div class="container">

    <div class="login-card">

        <div class="login-header">
            <h1>🎓 GradeFlow</h1>
            <p>Faculty Login</p>
        </div>

        <div class="login-body">

<form action="{% url 'login' %}" method="POST">

                <label for="username">Username</label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter Username"
                    required>

                <label for="password">Password</label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter Password"
                    required>

                <button type="submit">
                    Login
                </button>

            </form>

        </div>

        <div class="login-footer">

            <p>GradeFlow</p>

            <small>
                Automated Academic Performance Analytics Portal
            </small>

        </div>

    </div>

</div>

</body>
</html>
