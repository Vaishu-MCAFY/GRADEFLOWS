<html>
<head>
<title>Delete Student | GradeFlow</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

.container{
    width:90%;
    max-width:650px;
    margin:60px auto;
}

.card{
    background:#fff;
    border:2px solid #dc3545;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.card-header{
    background:#dc3545;
    color:white;
    padding:18px;
}

.card-header h2{
    font-size:26px;
}

.card-body{
    padding:25px;
}

.warning{
    background:#fff3cd;
    border:1px solid #ffe69c;
    color:#664d03;
    padding:15px;
    border-radius:5px;
    margin-bottom:25px;
}

.warning h3{
    margin-bottom:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:25px;
}

table th,
table td{
    border:1px solid #ddd;
    padding:12px;
    text-align:left;
}

table th{
    width:35%;
    background:#f8f9fa;
}

.button-group{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

.cancel-btn,
.delete-btn{
    text-decoration:none;
    padding:12px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.cancel-btn{
    background:#6c757d;
    color:white;
}

.cancel-btn:hover{
    background:#5c636a;
}

.delete-btn{
    background:#dc3545;
    color:white;
}

.delete-btn:hover{
    background:#bb2d3b;
}
.card-footer{
    text-align:center;
    padding:15px;
    background:#f8f9fa;
    color:#666;
    font-size:14px;
    border-top:1px solid #ddd;
}

@media(max-width:600px){

.button-group{
    flex-direction:column;
    gap:15px;
}

.cancel-btn,
.delete-btn{
    width:100%;
    text-align:center;
}

}

</style>

</head>
<body>

<div class="container">

<div class="card">

<div class="card-header">

<h2>Delete Student</h2>

</div>

<div class="card-body">

<div class="warning">

<h3>⚠ Warning</h3>

<p>

You are about to permanently delete this student record.

</p>

</div>

<table>

<tr>

<th>Student ID</th>

<td>{{ student.student_id }}</td>

</tr>

<tr>

<th>Name</th>

<td>{{ student.name }}</td>

</tr>

<tr>

<th>Email</th>

<td>{{ student.email }}</td>

</tr>

<tr>

<th>Department</th>

<td>{{ student.department }}</td>

</tr>

</table>

<form method="POST">

{% csrf_token %}

<div class="button-group">

<a href="{% url 'student_list' %}" class="cancel-btn">

Cancel

</a>

<button type="submit" class="delete-btn">

Delete Student

</button>

</div>

</form>

</div>

<div class="card-footer">

<strong>This action cannot be undone.</strong>

</div>

</div>

</div>

</body>
</html>
